name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04  # Ubuntu 22 = Python 3.10 = no distutils issues!

    steps:

    # Step 1: Get your code from GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Python 3.10 (avoids ALL distutils/longintrepr issues)
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          openjdk-17-jdk \
          git zip unzip wget \
          python3-pip \
          libffi-dev \
          libssl-dev \
          build-essential \
          libltdl-dev \
          zlib1g-dev \
          autoconf \
          automake \
          libtool
        java -version

    # Step 4: Install Python build tools (pinned versions that work!)
    - name: Install Buildozer and dependencies
      run: |
        pip install --upgrade pip
        pip install 'Cython<3'
        pip install buildozer==1.5.0
        pip install 'sh>=1.10,<2.0'
        pip install setuptools
        buildozer version

    # Step 5: Accept Android SDK licenses
    - name: Accept Android licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg

    # Step 6: Build the APK!
    - name: Build APK with Buildozer
      run: |
        cd $GITHUB_WORKSPACE
        yes | buildozer -v android debug 2>&1

    # Step 7: Upload APK so you can download it!
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SkyKiteIslandOdyssey-APK
        path: bin/*.apk
        if-no-files-found: error
